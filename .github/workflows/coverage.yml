# .github/workflows/coverage-simple.yml
name: Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov g++
    
    - name: Configure
      run: cmake --preset coverage-gcc
    
    - name: Build
      run: cmake --build --preset build-gcc
    
    - name: Run coverage
      run: cmake --build --preset report-gcc
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./build/coverage-gcc/coverage_filtered.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true
    
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-html
        path: build/coverage-gcc/coverage_report/